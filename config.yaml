# Life-as-Code Configuration File
# Centralizes all user-specific values, goals, and analysis thresholds

# Personal Data & Goals
user:
  weight_kg: 86
  height_cm: 184
  age: 32

goals:
  target_fat_percentage: 10

# Analysis Thresholds for Recovery Status
thresholds:
  recovery:
    hrv:
      excellent: 50
      good: 45
      moderate: 35
      poor: 25
    deep_sleep_min:
      excellent: 120
      good: 90
      moderate: 60
      poor: 30
    total_sleep_hours:
      excellent: 8.0
      good: 7.0
      moderate: 6.0
      poor: 5.0
  training:
    high_volume_kg: 5000  # Threshold for high training volume


# Validation Ranges for Input
validation:
  basic_ranges:
    min: 1
    max: 10
