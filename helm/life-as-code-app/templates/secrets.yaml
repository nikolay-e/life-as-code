# PostgreSQL connection secrets
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "life-as-code-app.fullname" . }}-postgres
  namespace: {{ include "life-as-code-app.namespace" . }}
  labels:
    {{- include "life-as-code-app.labels" . | nindent 4 }}
type: Opaque
data:
  POSTGRES_DB: {{ .Values.secrets.postgresDb | b64enc }}
  POSTGRES_USER: {{ .Values.secrets.postgresUser | b64enc }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | b64enc }}

---
# Application secrets (Flask SECRET_KEY and Fernet encryption key)
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "life-as-code-app.fullname" . }}-app
  namespace: {{ include "life-as-code-app.namespace" . }}
  labels:
    {{- include "life-as-code-app.labels" . | nindent 4 }}
type: Opaque
data:
  SECRET_KEY: {{ .Values.secrets.secretKey | b64enc }}
  FERNET_KEY: {{ .Values.secrets.fernetKey | b64enc }}

{{- if or .Values.secrets.garminEmail .Values.secrets.garminPassword .Values.secrets.hevyApiKey }}
---
# Optional pre-configured API credentials
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "life-as-code-app.fullname" . }}-credentials
  namespace: {{ include "life-as-code-app.namespace" . }}
  labels:
    {{- include "life-as-code-app.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secrets.garminEmail }}
  GARMIN_EMAIL: {{ .Values.secrets.garminEmail | b64enc }}
  {{- end }}
  {{- if .Values.secrets.garminPassword }}
  GARMIN_PASSWORD: {{ .Values.secrets.garminPassword | b64enc }}
  {{- end }}
  {{- if .Values.secrets.hevyApiKey }}
  HEVY_API_KEY: {{ .Values.secrets.hevyApiKey | b64enc }}
  {{- end }}
{{- end }}
