services:
  web:
    build:
      context: .
      args:
        - VERSION=${VERSION:-dev}
        - BUILD_DATE=${BUILD_DATE:-$(date -u +"%Y-%m-%dT%H:%M:%SZ")}
        - VCS_REF=${VCS_REF:-unknown}
    ports:
      - "8080:8080"
    environment:
      # Database
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-life_as_code_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-life_as_code_db}

      # Application Security
      - SECRET_KEY=${SECRET_KEY}
      - FERNET_KEY=${FERNET_KEY}

      # Rate Limiting Backend (recommended for production)
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}

      # Default Admin User (REQUIRED)
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}

      # Service Credentials (OPTIONAL)
      - GARMIN_EMAIL=${GARMIN_EMAIL:-}
      - GARMIN_PASSWORD=${GARMIN_PASSWORD:-}
      - HEVY_API_KEY=${HEVY_API_KEY:-}

      # OAuth Credentials (OPTIONAL)
      - WHOOP_CLIENT_ID=${WHOOP_CLIENT_ID:-}
      - WHOOP_CLIENT_SECRET=${WHOOP_CLIENT_SECRET:-}

      # Runtime Config
      - PYTHONUNBUFFERED=1
      - TZ=UTC
      - FLASK_DEBUG=False
    volumes:
      - ./.garminconnect:/app/.garminconnect
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  scheduler:
    build:
      context: .
      args:
        - VERSION=${VERSION:-dev}
        - BUILD_DATE=${BUILD_DATE:-$(date -u +"%Y-%m-%dT%H:%M:%SZ")}
        - VCS_REF=${VCS_REF:-unknown}
    command: ["python", "src/scheduler.py"]
    environment:
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-life_as_code_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-life_as_code_db}
      - SECRET_KEY=${SECRET_KEY}
      - FERNET_KEY=${FERNET_KEY}
      - GARMIN_EMAIL=${GARMIN_EMAIL:-}
      - GARMIN_PASSWORD=${GARMIN_PASSWORD:-}
      - HEVY_API_KEY=${HEVY_API_KEY:-}
      - WHOOP_CLIENT_ID=${WHOOP_CLIENT_ID:-}
      - WHOOP_CLIENT_SECRET=${WHOOP_CLIENT_SECRET:-}
      - SYNC_INTERVAL_HOURS=${SYNC_INTERVAL_HOURS:-4}
      - SYNC_DAYS=${SYNC_DAYS:-7}
      - PYTHONUNBUFFERED=1
      - TZ=UTC
      - LOG_FORMAT=${LOG_FORMAT:-json}
    volumes:
      - ./.garminconnect:/app/.garminconnect
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      disable: true
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_APP_VERSION=${VERSION:-dev}
        - VITE_BUILD_DATE=${BUILD_DATE:-$(date -u +"%Y-%m-%dT%H:%M:%SZ")}
        - VITE_COMMIT_SHA=${VCS_REF:-unknown}
    ports:
      - "3000:80"
    depends_on:
      - web
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-life_as_code_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-life_as_code_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-life_as_code_user} -d ${POSTGRES_DB:-life_as_code_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
