services:
  db_test:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=life_as_code_user
      - POSTGRES_PASSWORD=testpass
      - POSTGRES_DB=life_as_code_test
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U life_as_code_user -d life_as_code_test"]
      interval: 5s
      timeout: 5s
      retries: 5
