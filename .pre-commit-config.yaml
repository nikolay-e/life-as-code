minimum_pre_commit_version: '3.5.0'
default_stages: [pre-commit]
default_language_version:
  python: python3
  node: system

fail_fast: false # Run all hooks to get complete feedback

repos:
  # =============================================================================
  # FILE HYGIENE (Autofixing)
  # =============================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # Auto-fixable hygiene
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: ['--fix=lf']
      - id: fix-byte-order-marker

      # Critical safety checks
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: debug-statements
      - id: check-added-large-files
        args: ['--maxkb=1024']

      # File format checks
      - id: check-yaml
        exclude: ^helm/
      - id: check-json
      - id: check-toml
      - id: check-ast

  # =============================================================================
  # GITHUB ACTIONS VALIDATION
  # =============================================================================
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.35.0
    hooks:
      - id: check-github-workflows
        name: Validate GitHub workflows
        args: ['--verbose']
      - id: check-dependabot
        name: Validate Dependabot config

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.8
    hooks:
      - id: actionlint
        name: Lint GitHub Actions

  # =============================================================================
  # PYTHON FORMATTING & LINTING
  # =============================================================================
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        language_version: python3
        files: ^src/

  - repo: https://github.com/pycqa/isort
    rev: 6.0.1
    hooks:
      - id: isort
        args: ['--profile', 'black']
        files: ^src/

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.5
    hooks:
      - id: ruff
        name: Lint Python with ruff
        args: ['--fix', '--exit-non-zero-on-fix']
        files: ^src/
      - id: ruff-format
        name: Format Python with ruff
        files: ^src/

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.1
    hooks:
      - id: pyupgrade
        name: Upgrade Python syntax
        args: ['--py310-plus']
        files: ^src/.*\.py$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        name: Type check Python with mypy
        args: ['--ignore-missing-imports']
        additional_dependencies: ['types-requests', 'types-PyYAML']
        files: ^src/

  # =============================================================================
  # PYTHON SECURITY
  # =============================================================================
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.0
    hooks:
      - id: bandit
        name: Security scan Python (bandit)
        args: ['-q', '-r', '-x', 'tests,*/test_*.py', '--skip', 'B101,B108,B110']
        files: ^src/

  - repo: https://github.com/returntocorp/semgrep
    rev: v1.89.0
    hooks:
      - id: semgrep
        name: Semgrep (AST-based security)
        args:
          - '--config=p/security-audit'
          - '--config=p/python'
          - '--config=p/javascript'
          - '--config=p/typescript'
          - '--config=p/react'
          - '--error'
          - '--skip-unknown-extensions'
          - '--metrics=off'
        files: ^(src/|frontend/src/)
        exclude: /tests/

  - repo: https://github.com/PyCQA/pylint
    rev: v3.3.4
    hooks:
      - id: pylint
        name: Pylint (duplicate code detection)
        args:
          - '--disable=all'
          - '--enable=duplicate-code'
          - '--min-similarity-lines=20'
          - '--ignore-comments=yes'
          - '--ignore-docstrings=yes'
          - '--ignore-imports=yes'
        files: ^src/

  # =============================================================================
  # PYTHON DEAD CODE DETECTION
  # =============================================================================
  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.14
    hooks:
      - id: vulture
        name: Dead code detection (vulture)
        args:
          - 'src'
          - '--min-confidence'
          - '80'
          - '--exclude'
          - '__pycache__'
        pass_filenames: false
        files: ^src/.*\.py$

  # =============================================================================
  # PYTHON DEPENDENCY SECURITY
  # =============================================================================
  - repo: https://github.com/trailofbits/pip-audit
    rev: v2.9.0
    hooks:
      - id: pip-audit
        name: Python dependency vulnerability audit
        args: ['--skip-editable']
        files: ^(pyproject\.toml|requirements.*\.txt)$

  # =============================================================================
  # SECRET DETECTION
  # =============================================================================
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.29.0
    hooks:
      - id: gitleaks
        name: Scan for secrets (gitleaks)

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: Detect secrets (baseline-based)
        args: ['--baseline', '.secrets.baseline']
        exclude: ^(frontend/package-lock\.json)$

  # =============================================================================
  # FRONTEND (React/TypeScript)
  # =============================================================================
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        name: Format frontend with Prettier
        files: ^frontend/.*\.(js|jsx|ts|tsx|json|css|md)$
        exclude: ^frontend/(node_modules|dist)/
        args: ['--write']


  - repo: local
    hooks:
      - id: frontend-typecheck
        name: TypeScript type check (frontend)
        entry: bash -c 'cd frontend && npm run type-check'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false

      - id: frontend-lint
        name: ESLint (frontend)
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false

      - id: frontend-knip
        name: Dead code detection (knip)
        entry: bash -c 'cd frontend && npx knip --no-progress'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false

      - id: sort-package-json
        name: Sort package.json files
        entry: bash -c 'cd frontend && npx sort-package-json package.json'
        language: system
        files: ^frontend/package\.json$
        pass_filenames: false

      - id: jscpd
        name: Copy-paste detection (jscpd)
        entry: bash -c 'cd frontend && npx jscpd --min-lines 6 --min-tokens 50 --threshold 3 src/'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false

      - id: type-coverage
        name: Type coverage check (>=80%)
        entry: bash -c 'cd frontend && npx type-coverage --at-least 80 --ignore-catch || true'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false

      - id: npm-audit
        name: npm audit (security check)
        entry: bash -c 'cd frontend && npm audit --audit-level=high --production'
        language: system
        files: ^frontend/package(-lock)?\.json$
        pass_filenames: false

  # =============================================================================
  # CSS LINTING
  # =============================================================================
  - repo: https://github.com/thibaudcolas/pre-commit-stylelint
    rev: v16.25.0
    hooks:
      - id: stylelint
        name: Lint CSS files
        args: ['--fix', '--config', 'frontend/.stylelintrc.json']
        files: ^frontend/.*\.css$
        additional_dependencies:
          - stylelint@16.12.0
          - stylelint-config-recommended@13.0.0

  # =============================================================================
  # SHELL SCRIPTS
  # =============================================================================
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.12.0-2
    hooks:
      - id: shfmt
        name: Format shell scripts
        args: ['-i', '2', '-ci', '-w']

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        name: Lint shell scripts
        args: ['--exclude=SC2034,SC2155']

  # =============================================================================
  # DOCKER & INFRASTRUCTURE
  # =============================================================================
  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint-docker
        name: Lint Dockerfiles
        args:
          - '--ignore=DL3008'  # Pin versions (apt-get)
          - '--ignore=DL3018'  # Pin versions (alpine apk)
          - '--ignore=DL3013'  # Pin versions (pip)
          - '--ignore=DL3059'  # Multiple consecutive RUN

  - repo: local
    hooks:
      - id: docker-compose-check
        name: Docker Compose config validation
        entry: bash -c 'docker compose config -q'
        language: system
        files: ^docker-compose.*\.(yml|yaml)$
        pass_filenames: false

      - id: docker-build
        name: Docker build validation
        entry: bash -c 'docker build -t life-as-code:test .'
        language: system
        files: ^(Dockerfile|docker-entrypoint\.sh|src/.*\.py|pyproject\.toml)$
        pass_filenames: false
        stages: [pre-push]

  # =============================================================================
  # YAML & MARKDOWN
  # =============================================================================
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.1
    hooks:
      - id: yamllint
        name: Lint YAML files
        args: ['-d', 'relaxed']
        files: \.(yaml|yml)$
        exclude: ^helm/

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.45.0
    hooks:
      - id: markdownlint
        name: Lint Markdown files
        args: ['--fix']
        files: \.(md|markdown)$

  # =============================================================================
  # SPELL CHECKING
  # =============================================================================
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        name: Spell checking
        args:
          - '--write-changes'
          - '--ignore-words-list=crate,nd,ser,async,theses,ba,te,tha,ue,ist,hevy'
        exclude: ^(frontend/node_modules/|frontend/dist/|frontend/package-lock\.json)$

  # =============================================================================
  # COMMIT MESSAGE QUALITY (commit-msg hook)
  # =============================================================================
  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1
    hooks:
      - id: gitlint
        name: Validate commit message
        stages: [commit-msg]
        args: ['--msg-filename']
